<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 LocalHub — Dev Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1421;
    --surface2: #111827;
    --border: #1e2d45;
    --border-glow: #00d4ff33;
    --neon: #00d4ff;
    --neon2: #7c3aff;
    --neon3: #ff3a7c;
    --green: #00ff88;
    --yellow: #ffd700;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --radius: 12px;
    --radius-sm: 8px;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  .logo span { font-size: 13px; display: block; font-family: var(--font-mono); font-weight: 300; color: var(--text-dim); -webkit-text-fill-color: var(--text-dim); margin-top: -4px; letter-spacing: 2px; }
  .header-actions { display: flex; gap: 10px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent;
    transition: all 0.2s ease; text-decoration: none; white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--neon2), var(--neon));
    color: #fff; border-color: transparent;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--neon); color: var(--neon); background: rgba(0,212,255,0.05); }
  .btn-danger {
    background: transparent; color: var(--neon3);
    border-color: rgba(255,58,124,0.3);
  }
  .btn-danger:hover { background: rgba(255,58,124,0.1); border-color: var(--neon3); }
  .btn-success {
    background: transparent; color: var(--green);
    border-color: rgba(0,255,136,0.3);
  }
  .btn-success:hover { background: rgba(0,255,136,0.1); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* Section headings */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 3px;
    color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Default ports grid */
  .ports-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 48px;
  }
  .port-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    overflow: hidden;
  }
  .port-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon2), var(--neon));
    opacity: 0; transition: opacity 0.25s;
  }
  .port-card:hover { border-color: var(--neon); transform: translateY(-3px); background: var(--surface2); box-shadow: 0 8px 32px rgba(0,212,255,0.12); }
  .port-card:hover::before { opacity: 1; }
  .port-card .emoji { font-size: 28px; }
  .port-card .port-num {
    font-family: var(--font-display); font-size: 18px; font-weight: 800;
    color: var(--neon); letter-spacing: -0.5px;
  }
  .port-card .port-label {
    font-size: 10px; color: var(--text-dim); letter-spacing: 1px;
    font-weight: 400;
  }
  .port-card.featured { border-color: rgba(0,212,255,0.3); }
  .port-card.featured .port-num { color: var(--yellow); }

  /* Custom entries */
  .entries-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; margin-bottom: 32px;
  }
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex; flex-direction: column; gap: 12px;
    transition: all 0.2s ease;
    position: relative;
  }
  .entry-card:hover { border-color: var(--border-glow); box-shadow: 0 4px 20px rgba(0,212,255,0.07); }
  .entry-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .entry-name {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    color: var(--text); word-break: break-all;
    display: flex; align-items: center; gap: 8px;
  }
  .entry-name .e-emoji { font-size: 20px; }
  .entry-url {
    font-size: 11px; color: var(--neon); opacity: 0.8;
    word-break: break-all; font-weight: 400;
  }
  .entry-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .entry-open {
    display: block; width: 100%;
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: var(--radius-sm);
    padding: 8px;
    text-align: center; color: var(--neon);
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
    letter-spacing: 1px;
  }
  .entry-open:hover { background: rgba(0,212,255,0.15); box-shadow: 0 0 16px rgba(0,212,255,0.2); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 32px;
    width: 100%; max-width: 480px;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,212,255,0.1);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-family: var(--font-display); font-size: 20px; font-weight: 800;
    margin-bottom: 24px; color: var(--text);
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px;
    border-radius: 6px; transition: color 0.2s;
  }
  .modal-close:hover { color: var(--neon3); }

  /* Form */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-dim); letter-spacing: 1.5px; margin-bottom: 8px;
    text-transform: uppercase;
  }
  .form-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; color: var(--text);
    font-family: var(--font-mono); font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--neon); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: var(--radius-sm); padding: 12px 18px;
    font-size: 12px; color: var(--text);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 8px;
  }
  .toast-item.err { border-left-color: var(--neon3); }
  @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes toastOut { to { opacity:0; transform:translateX(20px); } }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 16px;
    margin-bottom: 40px; font-size: 11px; color: var(--text-dim);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .status-bar span { color: var(--neon); }

  /* Empty state */
  .empty-state {
    grid-column: 1/-1; text-align: center;
    padding: 48px; color: var(--text-dim);
  }
  .empty-state .big { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  /* Test panel */
  #test-panel {
    display: none;
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px; background: #050810;
    border-left: 1px solid var(--border);
    z-index: 300; overflow-y: auto;
    padding: 24px; font-family: var(--font-mono);
    box-shadow: -8px 0 40px rgba(0,0,0,0.6);
  }
  #test-panel.open { display: block; }
  .test-title { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--neon); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
  .test-suite { margin-bottom: 20px; }
  .test-suite-name { font-size: 12px; font-weight: 600; color: var(--yellow); margin-bottom: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .test-result { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; font-size: 11px; line-height: 1.5; }
  .test-result.pass { color: var(--green); }
  .test-result.fail { color: var(--neon3); }
  .test-result.pending { color: var(--text-dim); }
  .test-summary { margin-top: 16px; padding: 12px; background: var(--surface); border-radius: var(--radius-sm); font-size: 12px; }
  .test-pass { color: var(--green); }
  .test-fail { color: var(--neon3); }
  .test-run-btn { width: 100%; margin-bottom: 16px; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px;
  }
  .toolbar-left { display: flex; gap: 8px; flex-wrap: wrap; }

  @media (max-width: 640px) {
    .ports-grid { grid-template-columns: repeat(3, 1fr); }
    header { flex-direction: column; gap: 16px; align-items: flex-start; }
    .logo { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      🚀 LocalHub
      <span>// LOCAL DEV PORTAL</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="runTests()" title="TDD 테스트 실행">🧪 Tests</button>
      <button class="btn btn-ghost" onclick="exportJSON()">⬇️ Export</button>
      <label class="btn btn-ghost" style="cursor:pointer" title="JSON 업로드">
        ⬆️ Import <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </label>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 추가</button>
    </div>
  </header>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot"></div>
    IndexedDB <span id="db-status">연결 중...</span>
    &nbsp;·&nbsp; 커스텀 항목 <span id="entry-count">0</span>개
    &nbsp;·&nbsp; <span id="last-updated">—</span>
  </div>

  <!-- Default Ports -->
  <div class="section-label">⚡ 기본 포트</div>
  <div class="ports-grid" id="ports-grid">
    <!-- rendered by JS -->
  </div>

  <!-- Custom Entries -->
  <div class="toolbar">
    <div class="section-label" style="margin:0;flex:1">🔖 커스텀 주소</div>
    <div class="toolbar-left">
      <input class="form-input" id="search-input" placeholder="🔍 검색..." style="width:200px;padding:6px 12px;font-size:12px" oninput="renderEntries()">
    </div>
  </div>
  <div class="entries-grid" id="entries-grid">
    <div class="empty-state">
      <span class="big">📭</span>
      <p>아직 커스텀 주소가 없습니다.<br>상단 <strong>＋ 추가</strong> 버튼으로 추가하세요.</p>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">✏️ 주소 추가</div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group" style="flex:0 0 70px">
        <label class="form-label">이모지</label>
        <input class="form-input" id="form-emoji" placeholder="🌐" maxlength="4" style="text-align:center;font-size:20px">
      </div>
      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" id="form-name" placeholder="My Service" oninput="validateForm()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" id="form-url" placeholder="http://localhost:3000" oninput="validateForm()">
    </div>
    <div class="form-group">
      <label class="form-label">설명 (선택)</label>
      <input class="form-input" id="form-desc" placeholder="간단한 설명을 입력하세요">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveEntry()" disabled>저장</button>
    </div>
  </div>
</div>

<!-- Test Panel -->
<div id="test-panel">
  <div class="test-title">
    <span>🧪 TDD Test Runner</span>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('test-panel').classList.remove('open')">✕</button>
  </div>
  <button class="btn btn-primary test-run-btn" onclick="runTests()">▶ 전체 실행</button>
  <div id="test-output"></div>
</div>

<script>
// ============================================================
//  📦 DB MODULE
// ============================================================
const DB = (() => {
  const DB_NAME = 'LocalHubDB';
  const DB_VERSION = 2;
  const STORE = 'entries';
  let _db = null;
  let _openPromise = null;

  async function open() {
    if (_db) return _db;
    if (_openPromise) return _openPromise;

    // Warn if running via file:// (IndexedDB may be blocked in some browsers)
    if (location.protocol === 'file:') {
      console.warn('LocalHub: file:// 프로토콜에서는 일부 브라우저가 IndexedDB를 제한할 수 있습니다. http://localhost 로 서빙하는 것을 권장합니다.');
    }

    _openPromise = new Promise((resolve, reject) => {
      let req;
      try {
        req = indexedDB.open(DB_NAME, DB_VERSION);
      } catch(e) {
        _openPromise = null;
        return reject(new Error('IndexedDB를 사용할 수 없습니다: ' + e.message));
      }

      req.onupgradeneeded = e => {
        try {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE)) {
            const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
            store.createIndex('name', 'name', { unique: false });
          }
        } catch(err) {
          console.error('onupgradeneeded 오류:', err);
        }
      };
      req.onsuccess = e => {
        _db = e.target.result;
        _db.onversionchange = () => { _db.close(); _db = null; _openPromise = null; };
        _openPromise = null;
        resolve(_db);
      };
      req.onerror = e => {
        _openPromise = null;
        reject(new Error('DB 열기 실패: ' + (e.target.error?.message || String(e.target.error))));
      };
      req.onblocked = () => {
        _openPromise = null;
        reject(new Error('DB가 다른 탭에 의해 잠겨 있습니다. 다른 탭을 닫고 새로고침 해주세요.'));
      };
    });
    return _openPromise;
  }

  async function getAll() {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function add(entry) {
    if (!entry.name || !entry.url) throw new Error('name과 url은 필수입니다.');
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const data = { name: entry.name.trim(), url: entry.url.trim(), emoji: entry.emoji || '🌐', desc: entry.desc || '', createdAt: Date.now() };
      const req = tx.objectStore(STORE).add(data);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function update(entry) {
    if (!entry.id || !entry.name || !entry.url) throw new Error('id, name, url은 필수입니다.');
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put({ ...entry, name: entry.name.trim(), url: entry.url.trim() });
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function remove(id) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function clear() {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  return { open, getAll, add, update, remove, clear };
})();

// ============================================================
//  🧪 TDD TEST RUNNER
// ============================================================
const TestRunner = (() => {
  const suites = [];
  let current = null;

  function describe(name, fn) { current = { name, tests: [] }; suites.push(current); fn(); current = null; }

  function it(desc, fn) {
    if (!current) return;
    current.tests.push({ desc, fn });
  }

  function expect(val) {
    return {
      toBe: (exp) => { if (val !== exp) throw new Error(`Expected ${JSON.stringify(exp)}, got ${JSON.stringify(val)}`); },
      toEqual: (exp) => { if (JSON.stringify(val) !== JSON.stringify(exp)) throw new Error(`Expected ${JSON.stringify(exp)}, got ${JSON.stringify(val)}`); },
      toBeTruthy: () => { if (!val) throw new Error(`Expected truthy, got ${JSON.stringify(val)}`); },
      toBeFalsy: () => { if (val) throw new Error(`Expected falsy, got ${JSON.stringify(val)}`); },
      toContain: (exp) => { if (!val.includes(exp)) throw new Error(`Expected to contain ${JSON.stringify(exp)}`); },
      toThrow: async () => {
        try { await val(); throw new Error('Expected error not thrown'); }
        catch(e) { if (e.message === 'Expected error not thrown') throw e; }
      },
      toBeGreaterThan: (exp) => { if (!(val > exp)) throw new Error(`Expected ${val} > ${exp}`); },
      toMatch: (regexp) => { if (!regexp.test(String(val))) throw new Error(`Expected ${val} to match ${regexp}`); },
    };
  }

  async function run() {
    const results = [];
    for (const suite of suites) {
      const suiteResult = { name: suite.name, tests: [] };
      for (const t of suite.tests) {
        try { await t.fn(expect); suiteResult.tests.push({ desc: t.desc, status: 'pass' }); }
        catch (e) { suiteResult.tests.push({ desc: t.desc, status: 'fail', error: e.message }); }
      }
      results.push(suiteResult);
    }
    return results;
  }

  return { describe, it, run };
})();

// ============================================================
//  🛠 PURE UTILITY FUNCTIONS (Testable)
// ============================================================
function isValidUrl(url) {
  if (!url || !url.trim()) return false;
  return /^https?:\/\/.+/.test(url.trim());
}

function isValidName(name) {
  if (!name || !name.trim()) return false;
  return name.trim().length <= 100;
}

function createEntry({ name, url, emoji, desc } = {}) {
  if (!name || !name.trim()) throw new Error('name은 필수입니다.');
  if (!url || !url.trim()) throw new Error('url은 필수입니다.');
  return { name: name.trim(), url: url.trim(), emoji: emoji || '🌐', desc: desc || '' };
}

function serializeEntries(entries) {
  return JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), entries });
}

function parseImportJSON(jsonStr) {
  let parsed;
  try { parsed = JSON.parse(jsonStr); } catch { throw new Error('유효하지 않은 JSON입니다.'); }
  return Array.isArray(parsed.entries) ? parsed.entries : [];
}

function filterEntries(entries, q) {
  if (!q) return entries;
  const lower = q.toLowerCase();
  return entries.filter(e =>
    (e.name || '').toLowerCase().includes(lower) ||
    (e.url || '').toLowerCase().includes(lower) ||
    (e.desc || '').toLowerCase().includes(lower)
  );
}

// ============================================================
//  🎨 RENDER
// ============================================================
function renderPorts() {
  const grid = document.getElementById('ports-grid');
  grid.innerHTML = DEFAULT_PORTS.map(p => `
    <a class="port-card ${p.featured ? 'featured' : ''}" href="http://localhost:${p.port}" target="_blank" rel="noopener">
      <span class="emoji">${p.emoji}</span>
      <div class="port-num">${p.port}</div>
      <div class="port-label">${p.label}</div>
    </a>
  `).join('');
}

let _allEntries = [];

async function loadEntries() {
  try {
    _allEntries = await DB.getAll();
    renderEntries();
    updateStatus();
  } catch(e) { showToast('❌ DB 오류: ' + e.message, true); }
}

function renderEntries() {
  const q = document.getElementById('search-input').value;
  const filtered = filterEntries(_allEntries, q);
  const grid = document.getElementById('entries-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <span class="big">${q ? '🔍' : '📭'}</span>
      <p>${q ? `"${q}" 검색 결과가 없습니다.` : '아직 커스텀 주소가 없습니다.<br>상단 <strong>＋ 추가</strong> 버튼으로 추가하세요.'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(e => `
    <div class="entry-card" data-id="${e.id}">
      <div class="entry-card-header">
        <div class="entry-name"><span class="e-emoji">${e.emoji || '🌐'}</span>${escHtml(e.name)}</div>
        <div class="entry-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${e.id})" title="수정">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})" title="삭제">🗑</button>
        </div>
      </div>
      ${e.desc ? `<div style="font-size:11px;color:var(--text-dim)">${escHtml(e.desc)}</div>` : ''}
      <div class="entry-url">${escHtml(e.url)}</div>
      <a class="entry-open" href="${escHtml(e.url)}" target="_blank" rel="noopener">↗ 열기</a>
    </div>
  `).join('');
}

function updateStatus() {
  document.getElementById('db-status').textContent = '✅ 연결됨';
  document.getElementById('entry-count').textContent = _allEntries.length;
  document.getElementById('last-updated').textContent = _allEntries.length
    ? '최근: ' + new Date(Math.max(..._allEntries.map(e => e.createdAt || 0))).toLocaleString('ko-KR')
    : '데이터 없음';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
//  📝 MODAL
// ============================================================
function openAddModal() {
  document.getElementById('modal-title').textContent = '✏️ 주소 추가';
  document.getElementById('edit-id').value = '';
  document.getElementById('form-emoji').value = '🌐';
  document.getElementById('form-name').value = '';
  document.getElementById('form-url').value = '';
  document.getElementById('form-desc').value = '';
  document.getElementById('modal-save-btn').disabled = true;
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('form-name').focus(), 50);
}

async function openEditModal(id) {
  const entry = _allEntries.find(e => e.id === id);
  if (!entry) return;
  document.getElementById('modal-title').textContent = '✏️ 주소 수정';
  document.getElementById('edit-id').value = id;
  document.getElementById('form-emoji').value = entry.emoji || '🌐';
  document.getElementById('form-name').value = entry.name;
  document.getElementById('form-url').value = entry.url;
  document.getElementById('form-desc').value = entry.desc || '';
  document.getElementById('modal-save-btn').disabled = false;
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('form-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function validateForm() {
  const name = document.getElementById('form-name').value;
  const url = document.getElementById('form-url').value;
  document.getElementById('modal-save-btn').disabled = !(isValidName(name) && isValidUrl(url));
}

async function saveEntry() {
  const id = document.getElementById('edit-id').value;
  const data = {
    emoji: document.getElementById('form-emoji').value.trim() || '🌐',
    name: document.getElementById('form-name').value,
    url: document.getElementById('form-url').value,
    desc: document.getElementById('form-desc').value,
  };
  try {
    createEntry(data); // validation
    if (id) {
      const existing = _allEntries.find(e => e.id === parseInt(id));
      await DB.update({ ...existing, ...data, id: parseInt(id) });
      showToast('✅ 수정되었습니다.');
    } else {
      await DB.add(data);
      showToast('✅ 추가되었습니다.');
    }
    closeModal();
    await loadEntries();
  } catch(e) { showToast('❌ ' + e.message, true); }
}

async function deleteEntry(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await DB.remove(id);
    showToast('🗑 삭제되었습니다.');
    await loadEntries();
  } catch(e) { showToast('❌ ' + e.message, true); }
}

// ============================================================
//  📤 JSON EXPORT / IMPORT
// ============================================================
function exportJSON() {
  if (_allEntries.length === 0) { showToast('⚠️ 내보낼 항목이 없습니다.', true); return; }
  const json = serializeEntries(_allEntries);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `localhub-export-${Date.now()}.json`;
  a.click();
  showToast('⬇️ JSON 내보내기 완료');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const entries = parseImportJSON(e.target.result);
      if (entries.length === 0) { showToast('⚠️ 가져올 항목이 없습니다.', true); return; }
      let added = 0;
      for (const entry of entries) {
        try {
          if (entry.name && entry.url) { await DB.add({ emoji: entry.emoji || '🌐', name: entry.name, url: entry.url, desc: entry.desc || '' }); added++; }
        } catch {}
      }
      showToast(`⬆️ ${added}개 항목을 가져왔습니다.`);
      await loadEntries();
    } catch(e) { showToast('❌ ' + e.message, true); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================================
//  🍞 TOAST
// ============================================================
function showToast(msg, isErr = false) {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item' + (isErr ? ' err' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
//  🧪 TEST RUNNER UI
// ============================================================
async function runTests() {
  const panel = document.getElementById('test-panel');
  const output = document.getElementById('test-output');
  panel.classList.add('open');
  output.innerHTML = '<div style="color:var(--text-dim);font-size:12px">실행 중...</div>';

  const results = await TestRunner.run();
  let totalPass = 0, totalFail = 0;
  let html = '';

  for (const suite of results) {
    html += `<div class="test-suite">
      <div class="test-suite-name">📦 ${suite.name}</div>`;
    for (const t of suite.tests) {
      if (t.status === 'pass') { totalPass++; html += `<div class="test-result pass">✅ ${t.desc}</div>`; }
      else { totalFail++; html += `<div class="test-result fail">❌ ${t.desc}<br><span style="font-size:10px;opacity:0.7;padding-left:20px">${t.error || ''}</span></div>`; }
    }
    html += '</div>';
  }

  html += `<div class="test-summary">
    <span class="test-pass">✅ ${totalPass} passed</span>
    ${totalFail > 0 ? `&nbsp; <span class="test-fail">❌ ${totalFail} failed</span>` : ''}
    &nbsp;· Total: ${totalPass + totalFail}
  </div>`;
  output.innerHTML = html;
  showToast(totalFail === 0 ? `🧪 ${totalPass}개 테스트 모두 통과!` : `🧪 ${totalFail}개 실패`, totalFail > 0);
}

// ============================================================
//  🚀 KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openAddModal(); }
});
document.getElementById('modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

// ============================================================
//  🏁 INIT
// ============================================================
(async () => {
  defineTests();
  renderPorts();

  // file:// 프로토콜 경고 배너
  if (location.protocol === 'file:') {
    const bar = document.querySelector('.status-bar');
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:11px;color:#ffd700;display:flex;align-items:center;gap:8px;';
    banner.innerHTML = '⚠️ <strong>file:// 프로토콜 감지</strong> — Chrome에서는 로컬 파일을 직접 열면 IndexedDB가 차단될 수 있습니다. <code style="background:rgba(255,255,255,0.1);padding:1px 6px;border-radius:4px">npx serve .</code> 또는 VS Code Live Server로 실행하면 정상 작동합니다.';
    bar.insertAdjacentElement('beforebegin', banner);
  }

  try {
    // IndexedDB 지원 여부 먼저 확인
    if (!('indexedDB' in window) || !window.indexedDB) {
      throw new Error('이 브라우저는 IndexedDB를 지원하지 않습니다.');
    }
    await DB.open();
    document.getElementById('db-status').textContent = '✅ 연결됨';
    await loadEntries();
  } catch(e) {
    document.getElementById('db-status').textContent = '❌ 오류';
    const msg = e.message || String(e);
    showToast('❌ ' + msg, true);
    // entries 영역에도 오류 안내 표시
    document.getElementById('entries-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <span class="big">⚠️</span>
        <p style="color:var(--neon3);margin-bottom:8px"><strong>IndexedDB 연결 실패</strong></p>
        <p style="font-size:12px;line-height:1.8">${msg}<br><br>
        <strong style="color:var(--yellow)">해결 방법:</strong><br>
        1. <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">npx serve .</code> 또는 <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">python -m http.server</code><br>
        2. VS Code → Live Server 확장 사용<br>
        3. 브라우저를 최신 버전으로 업데이트</p>
      </div>`;
  }
})();
